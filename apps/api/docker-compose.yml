version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: ecommerce-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ecommerce
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - ecommerce-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ecommerce-backend
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/ecommerce
      JWT_SECRET: ${JWT_SECRET:-your-secret-key}
      PORT: 3000
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - ecommerce-network
    restart: unless-stopped
    command: sh -c "pnpm db:push && node dist/index.js"

  # Optional: Prisma Studio for database management
  prisma-studio:
    build:
      context: .
      dockerfile: Dockerfile
      target: builder
    container_name: ecommerce-prisma-studio
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/ecommerce
    ports:
      - "5555:5555"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - ecommerce-network
    command: pnpm db:studio
    profiles:
      - dev

volumes:
  postgres_data:

networks:
  ecommerce-network:
    driver: bridge