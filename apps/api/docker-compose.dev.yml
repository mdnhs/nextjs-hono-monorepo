version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: ecommerce-postgres-dev
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ecommerce
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - ecommerce-dev-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: builder
    container_name: ecommerce-backend-dev
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/ecommerce
      JWT_SECRET: dev-secret-key
      PORT: 3000
    volumes:
      - ./src:/app/src
      - ./prisma:/app/prisma
      - ./package.json:/app/package.json
      - ./tsconfig.json:/app/tsconfig.json
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - ecommerce-dev-network
    command: sh -c "pnpm db:push && pnpm db:seed && pnpm dev"

  prisma-studio:
    build:
      context: .
      dockerfile: Dockerfile
      target: builder
    container_name: ecommerce-prisma-studio-dev
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/ecommerce
    ports:
      - "5555:5555"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - ecommerce-dev-network
    command: pnpm db:studio

volumes:
  postgres_data_dev:

networks:
  ecommerce-dev-network:
    driver: bridge